    <rect class="panel" x="166" width="162" height="84" rx="5"/>
    <text class="yellow" x="80" y="28" text-anchor="middle" font-size="20">▾</text>
    <text class="value" x="80" y="58" text-anchor="middle">0.0715 €/kWh</text>
    <text class="muted" x="80" y="73" text-anchor="middle">Energia</text>
    <text class="yellow" x="246" y="28" text-anchor="middle" font-size="20">☀</text>
    <text class="value" x="246" y="58" text-anchor="middle">111.5 €</text>
    <text class="muted" x="246" y="73" text-anchor="middle">Sun Club</text>

    <g transform="translate(0 90)">
      <rect class="panel" width="160" height="84" rx="5"/>
      <rect class="panel" x="166" width="162" height="84" rx="5"/>
      <text class="red" x="80" y="28" text-anchor="middle" font-size="20">♜</text>
      <text class="value" x="80" y="58" text-anchor="middle">0.097 €/kW/d</text>
      <text class="muted" x="80" y="73" text-anchor="middle">Potencia P1</text>
      <text class="blue" x="246" y="28" text-anchor="middle" font-size="20">♜</text>
      <text class="value" x="246" y="58" text-anchor="middle">0.027 €/kW/d</text>
      <text class="muted" x="246" y="73" text-anchor="middle">Potencia P2</text>
    </g>

    <rect class="panel" y="178" width="328" height="48" rx="5"/>
    <text class="yellow" x="22" y="29" font-size="20">☀</text>
    <text class="label" x="46" y="23">Ventana Sun Club activa</text>
    <text class="muted" x="46" y="38">11 facturas · ultimo periodo 2026-03-17 a 2026-04-16</text>

    <g transform="translate(0 230)">
      <rect class="panel" width="328" height="230" rx="5"/>
      <text class="title" x="14" y="22">Creditos Sun Club recibidos</text>
      <text class="big" x="14" y="60">9,99</text><text class="muted" x="62" y="60">€</text>
      <text class="muted" x="14" y="76">Sun Club</text>
      <line class="grid" x1="50" y1="102" x2="314" y2="102"/>
      <line class="grid" x1="50" y1="142" x2="314" y2="142"/>
      <line class="axis" x1="50" y1="220" x2="314" y2="220"/>
      <rect class="yellow" x="135" y="162" width="9" height="58" rx="4"/>
      <rect class="yellow" x="162" y="102" width="9" height="118" rx="4"/>
      <rect class="yellow" x="189" y="154" width="9" height="66" rx="4"/>
      <rect class="yellow" x="216" y="142" width="9" height="78" rx="4"/>
      <rect class="yellow" x="243" y="139" width="9" height="81" rx="4"/>
      <rect class="yellow" x="276" y="161" width="9" height="59" rx="4"/>
      <rect class="yellow" x="300" y="125" width="9" height="95" rx="4"/>
      <text class="muted" x="76" y="238">Jun</text>
      <text class="muted" x="178" y="238">Sep</text>
      <text class="muted" x="250" y="238">Dec</text>
    </g>
  </g>

  <g transform="translate(700 26)">
    <rect class="panel" width="328" height="194" rx="5"/>
    <text class="title" x="14" y="28">Facturas Octopus</text>
    <text class="muted" x="14" y="44">3 facturas recientes</text>
    <text class="muted" x="292" y="34" font-size="22">⟳</text>
    <g transform="translate(14 64)">
      <text class="purple" x="0" y="12" font-size="18">▣</text>
      <text class="label" x="32" y="5">Factura 2026-03-17 a 2026-04-16</text>
      <text class="muted" x="32" y="22">2026-03-17 a 2026-04-16</text>
      <text class="muted" x="286" y="16" font-size="19">⬇</text>
    </g>
    <g transform="translate(14 110)">
      <text class="purple" x="0" y="12" font-size="18">▣</text>
      <text class="label" x="32" y="5">Factura 2026-02-15 a 2026-03-17</text>
      <text class="muted" x="32" y="22">2026-02-15 a 2026-03-17</text>
      <text class="muted" x="286" y="16" font-size="19">⬇</text>
    </g>
    <g transform="translate(14 156)">
      <text class="purple" x="0" y="12" font-size="18">▣</text>
      <text class="label" x="32" y="5">Factura 2026-01-18 a 2026-02-15</text>
      <text class="muted" x="32" y="22">2026-01-18 a 2026-02-15</text>
      <text class="muted" x="286" y="16" font-size="19">⬇</text>
    </g>

    <g transform="translate(0 230)">
      <text class="title" x="6" y="-8">Periodos</text>
      <rect class="panel" width="106" height="86" rx="5"/>
      <rect class="panel" x="110" width="106" height="86" rx="5"/>
      <rect class="panel" x="220" width="108" height="86" rx="5"/>
      <rect class="panel" y="90" width="106" height="86" rx="5"/>
      <rect class="panel" x="110" y="90" width="106" height="86" rx="5"/>
      <rect class="panel" x="220" y="90" width="108" height="86" rx="5"/>
      <text class="red" x="53" y="30" text-anchor="middle" font-size="18">☼</text>
      <text class="blue" x="163" y="30" text-anchor="middle" font-size="18">♨</text>
      <text class="purple" x="274" y="30" text-anchor="middle" font-size="18">☾</text>
      <text class="value" x="53" y="58" text-anchor="middle">0.0 kWh</text><text class="muted" x="53" y="74" text-anchor="middle">Punta dia</text>
      <text class="value" x="163" y="58" text-anchor="middle">0.0 kWh</text><text class="muted" x="163" y="74" text-anchor="middle">Llano dia</text>
      <text class="value" x="274" y="58" text-anchor="middle">11.4 kWh</text><text class="muted" x="274" y="74" text-anchor="middle">Valle dia</text>
      <text class="value" x="53" y="148" text-anchor="middle">3.3 kWh</text><text class="muted" x="53" y="164" text-anchor="middle">Punta mes</text>
      <text class="value" x="163" y="148" text-anchor="middle">2.8 kWh</text><text class="muted" x="163" y="164" text-anchor="middle">Llano mes</text>
      <text class="value" x="274" y="148" text-anchor="middle">22.7 kWh</text><text class="muted" x="274" y="164" text-anchor="middle">Valle mes</text>
    </g>
